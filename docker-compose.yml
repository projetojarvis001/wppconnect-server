version: '3'

services:
  wppconnect:
    container_name: wpp-server
    restart: unless-stopped
    build:
      context: .
    volumes:
      - ./config.ts:/usr/src/wpp-server/config.ts
      - ./wppconnect_tokens:/usr/src/wpp-server/tokens
    ports:
      - '8082:8082'
    environment:
      - WPP_SECRET_KEY=${WPP_SECRET_KEY}

volumes:
  wppconnect_tokens: {}
